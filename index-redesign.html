<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamWork — работа мечты по резюме</title>
<meta name="description" id="metadesc" content="DreamWork — загрузи резюме и получи подходящие вакансии напрямую с сайтов работодателей по всему миру плюс готовое сопроводительное письмо. Без VPN, на русском и английском.">
<meta property="og:title" content="DreamWork">
<meta property="og:description" content="Загрузи резюме — получи вакансии напрямую от работодателей и готовое сопроводительное письмо.">
<meta property="og:type" content="website">
<meta name="robots" content="index,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* mockup tokens */
  --pri:#5046E5;--pri-dk:#3730A3;--pri-lt:#EEF2FF;
  --acc:#F59E0B;--acc-lt:#FEF3C7;
  --ok:#10B981;--ok-lt:#ECFDF5;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;
  --g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g900:#111827;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --sh-md:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  --sh-lg:0 16px 48px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);
  /* aliases used by dynamic components (cards/letters/profile/toast) */
  --bg:#F9FAFB;--surface:#fff;--ink:#111827;--muted:#6B7280;--line:#E5E7EB;
  --accent:#5046E5;--accent-d:#3730A3;--accent-l:#EEF2FF;
  --grad:linear-gradient(135deg,#5b51e6 0%,#7b5cf0 100%);
  --teal:#0F6E56;--teal-l:#E1F5EE;--amber:#8a5208;--amber-l:#FAEEDA;
  --radius:16px;--sh:var(--sh-md);--shadow:var(--sh-md);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:16px;line-height:1.6;color:var(--g700);background:#fff;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{color:var(--g900);letter-spacing:-.4px}
a{color:var(--pri)}
:focus-visible{outline:2px solid var(--pri);outline-offset:2px}

/* NAV */
.nav{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--g100)}
.nav-in{max-width:1120px;margin:0 auto;padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-mark{width:34px;height:34px;background:var(--pri);border-radius:10px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:20px;height:20px}
.logo-text{font-size:17px;font-weight:800;color:var(--g900);letter-spacing:-.3px}
.nav-r{display:flex;align-items:center;gap:10px;flex-shrink:0}
.lang{display:flex;background:var(--g100);border-radius:8px;padding:3px;gap:2px}
.lang button{padding:4px 11px;font-size:13px;font-weight:600;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--g500);transition:all .15s;font-family:inherit}
.lang button.on{background:#fff;color:var(--g900);box-shadow:var(--sh-sm)}
.nav-cta{background:var(--pri);color:#fff;padding:9px 18px;border-radius:var(--r-sm);border:none;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap;font-family:inherit}
.nav-cta:hover{background:var(--pri-dk)}

/* BUTTONS (shared, used by dynamic card()/resume UI too) */
.btn{border:none;cursor:pointer;border-radius:var(--r-sm);padding:11px 18px;font-size:14px;font-weight:600;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.5;cursor:not-allowed;box-shadow:none}
.btn-primary{background:var(--pri);color:#fff;width:100%}
.btn-primary:hover{background:var(--pri-dk)}
.btn-ghost{background:#fff;color:var(--g700);border:1px solid var(--g200)}
.btn-ghost:hover{border-color:var(--pri);color:var(--pri);background:var(--pri-lt)}

/* HERO */
.hero{background:linear-gradient(160deg,#FAFAFA 0%,#EEEEFF 55%,#fff 100%);padding:80px 24px 72px;text-align:center;position:relative;overflow:hidden}
.hero-orb1,.hero-orb2{position:absolute;border-radius:50%;pointer-events:none}
.hero-orb1{width:500px;height:500px;top:-140px;right:-100px;background:radial-gradient(circle,rgba(80,70,229,.07) 0%,transparent 70%)}
.hero-orb2{width:400px;height:400px;bottom:-100px;left:-80px;background:radial-gradient(circle,rgba(245,158,11,.06) 0%,transparent 70%)}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--acc-lt);color:#92400E;border:1px solid #FDE68A;padding:5px 14px;border-radius:100px;font-size:13px;font-weight:500;margin-bottom:24px;position:relative;z-index:1}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.hero h1{font-size:clamp(32px,5.5vw,56px);font-weight:800;line-height:1.12;letter-spacing:-1.2px;color:var(--g900);max-width:780px;margin:0 auto 18px;position:relative;z-index:1}
.hero-sub{font-size:clamp(16px,2.2vw,19px);color:var(--g500);max-width:560px;margin:0 auto 36px;line-height:1.6;position:relative;z-index:1}

/* FORM CARD in hero */
.form-wrap{max-width:600px;margin:0 auto;position:relative;z-index:1;text-align:left}
.form-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-xl);padding:28px;box-shadow:var(--sh-lg)}
.filebox{border:2px dashed var(--g200);border-radius:var(--r-lg);padding:30px 18px;text-align:center;color:var(--g500);cursor:pointer;transition:.18s;margin-bottom:16px;font-size:14px;font-weight:500}
.filebox:hover{border-color:var(--pri);background:var(--pri-lt);color:var(--pri-dk)}
.filebox.has{border-color:var(--ok);color:#065F46;background:var(--ok-lt)}
.row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.field{flex:1;min-width:140px}
label{display:block;font-size:12px;color:var(--g500);margin-bottom:5px;font-weight:500}
.field label{min-height:2.6em}
input[type=text],input[type=number],input[type=email],select,textarea{width:100%;background:var(--g50);color:var(--g900);border:1px solid var(--g200);border-radius:var(--r-sm);padding:10px 12px;font-family:inherit;font-size:14px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 4px rgba(80,70,229,.12);background:#fff}
.check{display:flex;align-items:center;gap:8px;color:var(--g500);font-size:14px;font-weight:500}
.consent{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--g500);margin:4px 0 12px;cursor:pointer}
.consent input{margin-top:3px}
.spinner{display:none;color:var(--g500);font-size:14px;margin-top:10px;text-align:center}
.apihint{display:block;margin-top:10px;color:var(--g400);font-size:12px;text-align:center}
.note{font-size:13px;color:var(--g400);text-align:center;margin-top:10px}
.hint{color:var(--g400);font-size:13px}
small.hint{display:block;margin-top:8px}
.hero-trust{display:flex;align-items:center;justify-content:center;gap:18px;flex-wrap:wrap;position:relative;z-index:1;margin-top:28px}
.trust-item{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:var(--g500)}
.trust-item svg{color:var(--ok);flex-shrink:0}
.trust-sep{width:4px;height:4px;border-radius:50%;background:var(--g200)}

/* GEO BAR */
.geo-bar{border-top:1px solid var(--g100);border-bottom:1px solid var(--g100);padding:18px 24px;background:var(--g50)}
.geo-in{max-width:1120px;margin:0 auto;display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
.geo-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--g400);white-space:nowrap}
.geo-pills{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.geo-pill{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:var(--g700);background:#fff;border:1px solid var(--g200);border-radius:100px;padding:5px 12px;white-space:nowrap;box-shadow:var(--sh-sm)}

/* SECTIONS */
.section{padding:88px 24px}
.sec-in{max-width:1120px;margin:0 auto}
.sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--pri);margin-bottom:12px;text-align:center}
.sec-h{font-size:clamp(26px,4vw,42px);font-weight:800;letter-spacing:-.8px;line-height:1.15;color:var(--g900);text-align:center;margin-bottom:14px}
.sec-sub{font-size:18px;color:var(--g500);text-align:center;max-width:560px;margin:0 auto 56px;line-height:1.6}

/* STEPS */
.steps-grid{display:grid;grid-template-columns:1fr 48px 1fr 48px 1fr;align-items:start}
.step-conn{display:flex;align-items:center;justify-content:center;margin-top:42px}
.step-conn-line{height:2px;width:100%;background:linear-gradient(to right,var(--pri),var(--acc));border-radius:2px}
.step-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:30px 26px;box-shadow:var(--sh-sm);transition:all .25s}
.step-card:hover{transform:translateY(-5px);box-shadow:var(--sh-lg);border-color:var(--pri)}
.step-n{width:34px;height:34px;background:var(--pri);color:#fff;border-radius:10px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.step-n.acc{background:var(--acc)}
.step-ico{width:50px;height:50px;background:var(--pri-lt);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.step-ico.acc{background:var(--acc-lt)}
.step-ico svg{width:25px;height:25px;color:var(--pri)}
.step-ico.acc svg{color:#B45309}
.step-card h3{font-size:18px;font-weight:700;margin-bottom:10px;line-height:1.3}
.step-card p{font-size:14px;color:var(--g500);line-height:1.7}

/* FEATURES */
.feat-bg{background:var(--g50)}
.feat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.feat-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:28px;box-shadow:var(--sh-sm);transition:all .25s}
.feat-card:hover{transform:translateY(-4px);box-shadow:var(--sh-md);border-color:var(--pri)}
.feat-ico{width:44px;height:44px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.feat-ico svg{width:22px;height:22px}
.fi{background:var(--pri-lt);color:var(--pri)}.fa{background:var(--acc-lt);color:#B45309}.fg{background:var(--ok-lt);color:#065F46}
.feat-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.feat-card p{font-size:14px;color:var(--g500);line-height:1.7}

/* REGIONS */
.regions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.region-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:24px 16px;text-align:center;box-shadow:var(--sh-sm);transition:all .25s}
.region-card:hover{transform:translateY(-4px);box-shadow:var(--sh-md);border-color:var(--pri)}
.region-flag{font-size:32px;line-height:1;margin-bottom:10px;display:block}
.region-card h4{font-size:14px;font-weight:700;margin-bottom:4px}
.region-card p{font-size:12px;color:var(--g400);line-height:1.5}

/* PRICING (real) */
.pricing-bg{background:var(--g50)}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1000px;margin:0 auto;align-items:start}
.price-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-xl);padding:32px 26px;box-shadow:var(--sh-sm);position:relative;transition:all .25s}
.price-card:hover{transform:translateY(-4px);box-shadow:var(--sh-lg)}
.price-card.featured{border:2px solid var(--pri);box-shadow:0 0 0 4px rgba(80,70,229,.08),var(--sh-lg)}
.price-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);background:var(--pri);color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 16px;border-radius:100px;white-space:nowrap}
.price-tier{font-size:13px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.price-amount{font-size:40px;font-weight:800;color:var(--g900);letter-spacing:-1.2px;line-height:1;margin-bottom:6px}
.price-desc{font-size:13px;color:var(--g500);margin-bottom:20px;line-height:1.5;min-height:36px}
.price-divider{height:1px;background:var(--g100);margin-bottom:20px}
.price-list{list-style:none;display:flex;flex-direction:column;gap:11px;margin-bottom:24px}
.price-list li{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:var(--g700);line-height:1.5}
.price-list .chk{width:20px;height:20px;background:var(--ok-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.price-list .chk svg{width:11px;height:11px;color:var(--ok)}
.pay-note{text-align:center;margin:28px auto 0;font-size:13px;color:var(--g400);max-width:760px}
.lang-toggle{display:flex;gap:6px;margin:6px 0}
.lang-toggle button{font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--g200);background:#fff;color:var(--g500);cursor:pointer}
.lang-toggle button.on{background:var(--pri);color:#fff;border-color:var(--pri)}
.status{font-size:13px;color:var(--g500);margin-top:8px}

/* RESULTS / PROFILE / CARDS (dynamic) */
#resultsWrap{max-width:1000px;margin:0 auto;padding:0 24px}
.profile{background:var(--pri-lt);border-radius:var(--r-lg);padding:16px 18px;margin:24px 0 4px;font-size:14px;color:var(--accent-d)}
.profile b{color:var(--g900)}.profile .hint{color:var(--pri);opacity:.85;font-size:13px}
#results h2{font-size:22px;font-weight:800;margin:24px 0 16px}
.card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:20px 22px;margin-bottom:14px;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh-lg)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.title{font-size:17px;font-weight:700;color:var(--g900)}
.company{color:var(--g500);font-size:14px;margin-top:2px}
.src{font-size:11px;background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:3px 9px;color:var(--g500);white-space:nowrap}
.meta{font-size:13px;color:var(--g500);margin-top:8px}
.salary{font-weight:700;margin-top:6px}
.salary.green{color:var(--ok)}.salary.amber{color:#B45309}.salary.gray{color:var(--g400);font-weight:400}
.fit{font-size:14px;margin:10px 0;color:var(--g700)}
.score{display:inline-block;font-size:11px;background:var(--ok-lt);color:#065F46;border-radius:8px;padding:2px 9px;margin-left:8px;font-weight:600}
.actions{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
.actions .btn{width:auto}
.letter-box{display:none;margin-top:14px;background:var(--g50);border:1px solid var(--g200);border-radius:12px;padding:14px}
.letter-box.open{display:block}
.lactions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.lactions .btn{width:auto}
textarea{min-height:210px;line-height:1.5;resize:vertical;background:#fff}

/* FAQ */
details.faq{background:#fff;border:1px solid var(--g200);border-radius:12px;padding:14px 18px;margin-bottom:9px;max-width:760px;margin-left:auto;margin-right:auto;transition:.15s}
details.faq[open]{box-shadow:var(--sh-sm)}
details.faq summary{cursor:pointer;font-weight:600;font-size:15px;list-style:none;color:var(--g900)}
details.faq summary::-webkit-details-marker{display:none}
details.faq summary::before{content:"+";color:var(--pri);font-weight:700;margin-right:8px}
details.faq[open] summary::before{content:"–"}
details.faq .a{font-size:14px;color:var(--g500);margin-top:8px;line-height:1.6}

/* CONTACTS */
.contacts-card{background:#fff;border:1px solid var(--g200);border-radius:var(--r-lg);padding:22px;max-width:620px;margin:0 auto;line-height:1.9;box-shadow:var(--sh-sm)}

/* CTA BAND */
.cta-band{background:linear-gradient(130deg,#4338CA 0%,var(--pri) 40%,#7C3AED 100%);padding:88px 24px;text-align:center;position:relative;overflow:hidden}
.cta-band::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.04) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.cta-band h2{font-size:clamp(28px,4vw,46px);font-weight:800;color:#fff;letter-spacing:-.8px;margin-bottom:16px;position:relative}
.cta-band p{font-size:18px;color:rgba(255,255,255,.75);max-width:480px;margin:0 auto 36px;position:relative;line-height:1.6}
.btn-white{background:#fff;color:var(--pri);padding:15px 34px;border-radius:var(--r-sm);border:none;font-size:16px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:all .15s;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.2);font-family:inherit}
.btn-white:hover{transform:translateY(-2px)}
.cta-note{font-size:13px;color:rgba(255,255,255,.5);margin-top:16px;position:relative}

/* FOOTER */
footer{background:var(--g900);padding:56px 24px 32px}
.foot-in{max-width:1120px;margin:0 auto}
.foot-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:44px;flex-wrap:wrap;gap:36px}
.foot-brand .logo-mark{width:32px;height:32px}
.foot-brand-name{font-size:16px;font-weight:700;color:#fff;margin-left:10px}
.foot-tagline{font-size:13px;color:rgba(255,255,255,.4);margin-top:10px;max-width:240px;line-height:1.55}
.foot-col h5{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.3);margin-bottom:16px}
.foot-col a{display:block;font-size:14px;color:rgba(255,255,255,.6);text-decoration:none;margin-bottom:10px;transition:color .15s;cursor:pointer}
.foot-col a:hover{color:#fff}
.foot-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.foot-copy{font-size:12px;color:rgba(255,255,255,.3)}
.foot-inn{font-size:12px;color:rgba(255,255,255,.35)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--g900);color:#fff;padding:12px 24px;border-radius:13px;font-weight:600;font-size:14px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:99;box-shadow:var(--sh-lg)}
.toast.show{opacity:1}

@media(max-width:960px){
  .steps-grid{grid-template-columns:1fr;gap:16px}.step-conn{display:none}
  .feat-grid{grid-template-columns:repeat(2,1fr)}
  .regions-grid{grid-template-columns:repeat(2,1fr)}
  .pricing-grid{grid-template-columns:1fr;max-width:460px}
}
@media(max-width:640px){
  .hero{padding:56px 16px 48px}.section{padding:60px 16px}
  .feat-grid{grid-template-columns:1fr}.foot-top{flex-direction:column}
  .nav-in{padding:0 16px}.hero-trust{gap:12px}.trust-sep{display:none}
  .sec-sub{font-size:16px;margin-bottom:40px}.form-card{padding:20px}
}
@media(prefers-reduced-motion:no-preference){
  .anim{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease}
  .anim.visible{opacity:1;transform:translateY(0)}
  .anim-d1{transition-delay:.08s}.anim-d2{transition-delay:.16s}.anim-d3{transition-delay:.24s}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-in">

let LANG = localStorage.getItem('dw_lang') || ((navigator.language||'').toLowerCase().startsWith('ru') ? 'ru' : 'en');
function t(k){ return (T[LANG] && T[LANG][k]) || (T.ru[k]||k); }

function applyLang(){
  document.documentElement.lang = LANG;
  document.title = t('title');
  const md=document.getElementById('metadesc'); if(md) md.content = t('meta_desc');
  document.querySelectorAll('[data-i]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i')); });
  document.querySelectorAll('[data-i-ph]').forEach(el=>{ el.placeholder = t(el.getAttribute('data-i-ph')); });
  document.querySelectorAll('[data-ui-lang]').forEach(b=>b.classList.toggle('on', b.getAttribute('data-ui-lang')===LANG));
  if(fileInput && fileInput.files[0]){ filebox.textContent='✅ '+fileInput.files[0].name; filebox.classList.add('has'); }
  setupResumeUI();
  refreshApiHint();
}

const fileInput = document.getElementById('file');
const filebox = document.getElementById('filebox');
const MAX_UPLOAD_MB = 5;

function validateFile(f){
  if(!f) return false;
  if(!/\.(pdf|docx|txt)$/i.test(f.name)){ toast(t('err_bad_format')); return false; }
  if(f.size === 0){ toast(t('err_empty_file')); return false; }
  if(f.size > MAX_UPLOAD_MB*1024*1024){ toast(t('err_too_large')); return false; }
  return true;
}
function markFile(f){ filebox.textContent='✅ '+f.name; filebox.classList.add('has'); }

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if(!f) return;
  if(validateFile(f)){ markFile(f); }
  else { fileInput.value=''; filebox.classList.remove('has'); filebox.textContent=t('form_file'); }
});
['dragover','dragleave','drop'].forEach(ev => filebox.addEventListener(ev, e => {
  e.preventDefault();
  if (ev==='drop' && e.dataTransfer.files[0]) {
    const f = e.dataTransfer.files[0];
    if(validateFile(f)){ fileInput.files = e.dataTransfer.files; markFile(f); }
  }
}));
document.querySelectorAll('[data-ui-lang]').forEach(b=>b.addEventListener('click',()=>{
  LANG=b.getAttribute('data-ui-lang'); localStorage.setItem('dw_lang',LANG); applyLang();
}));

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeUrl(u){ u=String(u==null?'':u).trim(); return /^https?:\/\//i.test(u) ? u : '#'; }
function errMsg(code){ const k='err_'+(code||'generic'); const v=t(k); return (v===k)?t('err_generic'):v; }
async function readErrCode(r){
  try{ const j=await r.json(); return (j && j.detail && j.detail.code) || (j && j.code) || null; }
  catch(_){ if(r.status===429) return 'rate_limited'; if(r.status>=500) return 'server'; return null; }
}
function salaryClass(j){
  const lo=j.salary_min; if(!j.salary) return 'gray';
  if(lo && lo>=3000 && j.currency!=='RUB') return 'green';
  if(lo && lo>=270000) return 'green';
  return j.salary? 'amber':'gray';
}

async function copyText(text, ta){
  try{ await navigator.clipboard.writeText(text); return true; }catch(e){}
  try{ if(ta){ ta.focus(); ta.select(); const ok=document.execCommand('copy'); if(ok) return true; } }catch(e){}
  try{ const x=document.createElement('textarea'); x.value=text; x.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(x); x.select(); const ok=document.execCommand('copy'); document.body.removeChild(x); return ok; }catch(e){ return false; }
}

async function runMatch(){
  if(!fileInput.files[0]){ toast(t('t_pick')); return; }
  if(!validateFile(fileInput.files[0])){ return; }
  if(!document.getElementById('consent').checked){ toast(t('consent_required')); return; }
  const go=document.getElementById('go'), sp=document.getElementById('spinner');
  go.disabled=true; sp.style.display='block';
  document.getElementById('results').innerHTML=''; document.getElementById('profile').innerHTML='';
  const fd=new FormData();
  fd.append('resume', fileInput.files[0]);
  fd.append('country', document.getElementById('country').value);
  fd.append('location', document.getElementById('location').value);
  fd.append('salary_min', document.getElementById('salary').value);
  fd.append('currency', document.getElementById('currency').value);
  fd.append('remote_ok', document.getElementById('remote').checked);
  try{
    const r=await fetch(API+'/api/match',{method:'POST',body:fd});
    if(!r.ok){ throw {code: await readErrCode(r)}; }
    const data=await r.json();
    PROFILE=data.profile; RESUME=data.resume_excerpt||'';
    renderProfile(data.profile);
    renderResults(data.jobs||[], data.note);
    document.getElementById('resultsWrap').scrollIntoView({behavior:'smooth'});
  }catch(e){ toast(errMsg(e&&e.code)); console.error(e); }
  finally{ go.disabled=false; sp.style.display='none'; }
}

function renderProfile(p){
  if(!p) return;
  document.getElementById('profile').innerHTML =
    `<div class="profile"><b>${esc(p.headline||p.name||'')}</b> · ${esc(p.seniority||'')}<br>
     ${esc(p.summary||'')}<br><span class="hint">${t('profile_search')}: ${esc(p.search_query||'')} · ${t('profile_goals')}: ${esc((p.target_titles||[]).join(', '))}</span></div>`;
}

let _allJobs=[], _shown=0;
const PAGE=5;
function renderResults(jobs, note){
  const box=document.getElementById('results');
  if(!jobs.length){ box.innerHTML=`<p class="status-msg">${note||t('no_results')}</p>`; return; }
  _allJobs=jobs; _shown=0;
  box.innerHTML=`<h2>${t('results_h')} (${jobs.length})</h2><div id="cards"></div><div id="morewrap" style="text-align:center;margin:10px 0"></div>`;
  showMore();
}
function showMore(){
  const cards=document.getElementById('cards');
  _allJobs.slice(_shown, _shown+PAGE).forEach(j=>cards.appendChild(card(j)));
  _shown=Math.min(_shown+PAGE, _allJobs.length);
  const mw=document.getElementById('morewrap');
  if(_shown<_allJobs.length){
    const more = LANG==='ru' ? 'Показать ещё' : 'Show more';
    mw.innerHTML=`<button class="btn btn-ghost" id="moreBtn" style="width:auto">${more} (${_allJobs.length-_shown})</button>`;
    document.getElementById('moreBtn').addEventListener('click', showMore);
  } else { mw.innerHTML=''; }
}

function el(h){const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}

function card(j){
  const sc=j.score!=null?`<span class="score">${esc(j.score)}% ${t('match')}</span>`:'';
  const c=el(`<div class="card">
    <div class="card-top">
      <div><div class="title">${esc(j.title||'')} ${sc}</div><div class="company">${esc(j.company||'')}</div></div>
      <span class="src">${esc(j.source||'')}</span>
    </div>
    <div class="meta">📍 ${esc(j.location||'—')} ${j.remote?t('remote_tag'):''}</div>
    <div class="salary ${salaryClass(j)}">${esc(j.salary||t('salary_none'))}</div>
    ${j.fit?`<div class="fit">${esc(j.fit)}</div>`:''}
    <div class="actions">
      <a class="btn btn-ghost" href="${safeUrl(j.url)}" target="_blank" rel="noopener noreferrer">${t('card_vacancy')}</a>
      <button class="btn btn-primary" style="width:auto" data-a="letter">${t('card_letter')}</button>
      <button class="btn btn-ghost" data-a="apply">${t('card_apply')}</button>
    </div>
    <div class="letter-box" data-box>
      <div class="lang-toggle"><button data-lang="ru">RU</button><button data-lang="en">EN</button></div>
      <div class="status" data-st></div>
      <div data-payrow style="display:none">
        <input data-payemail type="email" placeholder="${t('pay_email_ph')}" style="width:100%;margin-bottom:8px">
        <button class="btn btn-primary" style="width:auto" data-a="pay">${t('pay_btn').replace('{price}',(_PAID&&_PAID.price)||'99')}</button>
        <div class="status" data-payst></div>
      </div>
      <textarea data-ta placeholder="${t('letter_ph')}"></textarea>
      <div class="lactions">
        <button class="btn btn-ghost" data-a="copy">${t('letter_copy')}</button>
        <button class="btn btn-ghost" data-a="regen">${t('letter_regen')}</button>
      </div>
      <small class="hint">${t('letter_hint')}</small>
    </div>
  </div>`);

  const box=c.querySelector('[data-box]'), ta=c.querySelector('[data-ta]'), st=c.querySelector('[data-st]');
  let lang=LANG;
  c.querySelectorAll('[data-lang]').forEach(b=>{
    b.classList.toggle('on', b.dataset.lang===lang);
    b.onclick=()=>{ lang=b.dataset.lang; c.querySelectorAll('[data-lang]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
  });

  async function gen(force){
    box.classList.add('open');
    if(_PAID && _PAID.on){
      ta.style.display='none';
      c.querySelector('.lactions').style.display='none';
      c.querySelector('[data-payrow]').style.display='block';
      st.textContent=t('pay_hint');
      return;
    }
    if(ta.value && !force){ st.textContent=t('letter_have'); return; }
    st.textContent=t('letter_writing'); ta.value='';
    try{
      const r=await fetch(API+'/api/letter',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({job:j, profile:PROFILE, resume_text:RESUME, lang})});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json(); ta.value=(d.letter||'').trim(); st.textContent=t('letter_ready');
    }catch(e){ st.textContent=t('letter_fail')+errMsg(e&&e.code); }
  }

  async function startPay(){
    const emEl=c.querySelector('[data-payemail]'), payst=c.querySelector('[data-payst]');
    const email=(emEl.value||'').trim();
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast(t('pay_email_req')); return; }
    payst.textContent=t('pay_creating');
    try{
      localStorage.setItem('dw_pending', JSON.stringify({job:j, profile:PROFILE, resume_text:RESUME, lang}));
      const r=await fetch(API+'/api/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json();
      if(!d.confirmation_url) throw {code:'pay_error'};
      localStorage.setItem('dw_payid', d.payment_id);
      window.location.href=d.confirmation_url;
    }catch(e){ payst.textContent=errMsg(e&&e.code); localStorage.removeItem('dw_pending'); }
  }

  c.addEventListener('click', async ev=>{
    const a=ev.target?.dataset?.a; if(!a) return;
    if(a==='letter') gen(false);
    if(a==='pay') startPay();
    if(a==='regen') gen(true);
    if(a==='copy'){ if(!ta.value){toast(t('t_letter_first'));return;}
      toast(await copyText(ta.value, ta)?t('t_copied'):t('t_selected')); }
    if(a==='apply'){ if(!ta.value){ await gen(false); }
      await copyText(ta.value, ta); window.open(safeUrl(j.url),'_blank','noopener');
      toast(t('t_buffer')); }
  });
  return c;
}

let _health=null;

  const h=_health;
  const elx=document.getElementById('apihint');

async function handlePaidReturn(){
  const payid=localStorage.getItem('dw_payid'), pending=localStorage.getItem('dw_pending');
  if(!payid || !pending) return;
  const panel=document.getElementById('paidResult');
  panel.style.display='block';
  panel.innerHTML=`<div class="profile"><b>${t('paid_checking')}</b></div>`;
  try{
    const sr=await fetch(API+'/api/pay/status?payment_id='+encodeURIComponent(payid));
    const sd=await sr.json();
    if(sd.status!=='succeeded'){
      panel.innerHTML=`<div class="profile">${sd.status==='canceled'?t('pay_canceled'):t('pay_processing')}</div>`;
      if(sd.status==='canceled'){ localStorage.removeItem('dw_payid'); localStorage.removeItem('dw_pending'); }
      return;
    }
    const ctx=JSON.parse(pending);
    let endpoint, titleKey, body, isResume=(ctx.product==='resume');
    if(isResume){
      endpoint='/api/resume'; titleKey='paid_resume_title';
      body={mode:ctx.mode, resume_text:ctx.resume_text, target:ctx.target, fields:ctx.fields, lang:ctx.lang, payment_id:payid};
    } else {
      endpoint='/api/letter'; titleKey='paid_letter_title';
      body={job:ctx.job, profile:ctx.profile, resume_text:ctx.resume_text, lang:ctx.lang, payment_id:payid};
    }
    const gr=await fetch(API+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!gr.ok) throw {code: await readErrCode(gr)};
    const gd=await gr.json();
    localStorage.removeItem('dw_payid'); localStorage.removeItem('dw_pending');
    const resultText=isResume?(gd.resume||''):(gd.letter||'');
    if(isResume){ showResumeResult(resultText); return; }
    const sub=`<div class="hint">${esc((ctx.job&&ctx.job.title)||'')} · ${esc((ctx.job&&ctx.job.company)||'')}</div>`;
    panel.innerHTML=`<div class="profile"><b>${t(titleKey)}</b>${sub}</div>
      <textarea id="paidTa" style="width:100%;min-height:240px;margin-top:8px"></textarea>
      <div class="lactions"><button class="btn btn-ghost" id="paidCopy">${t('letter_copy')}</button></div>`;
    document.getElementById('paidTa').value=resultText.trim();
    document.getElementById('paidCopy').addEventListener('click', async ()=>{ const ta=document.getElementById('paidTa'); toast(await copyText(ta.value,ta)?t('t_copied'):t('t_selected')); });
    panel.scrollIntoView({behavior:'smooth'});
  }catch(e){ panel.innerHTML=`<div class="profile">${t('letter_fail')+errMsg(e&&e.code)}</div>`; }
}

function mdToHtml(md){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  let html='', inList=false; const close=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  (md||'').split('\n').forEach(raw=>{
    const s=raw.trim();
    if(!s){ close(); return; }
    if(/^---+$/.test(s)){ close(); html+='<hr>'; return; }
    if(/^###\s+/.test(s)){ close(); html+='<h3>'+inl(s.replace(/^###\s+/,''))+'</h3>'; return; }
    if(/^##\s+/.test(s)){ close(); html+='<h2>'+inl(s.replace(/^##\s+/,''))+'</h2>'; return; }
    if(/^#\s+/.test(s)){ close(); html+='<h1>'+inl(s.replace(/^#\s+/,''))+'</h1>'; return; }
    if(/^[-*•]\s+/.test(s)){ if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+inl(s.replace(/^[-*•]\s+/,''))+'</li>'; return; }
    close(); html+='<p>'+inl(s)+'</p>';
  });
  close(); return html;
}
async function downloadResumeDocx(text){
  if(!text||text.trim().length<20){ toast(t('resume_need_fields')); return; }
  try{
    const r=await fetch(API+'/api/resume/docx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resume:text})});
    if(!r.ok) throw {code: await readErrCode(r)};
    const blob=await r.blob(); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='resume.docx';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){ toast(errMsg(e&&e.code)); }
}

async function onResumeGo(){
  const st=document.getElementById('rmStatus');
  const ctx={product:'resume', mode:_rmMode, lang:LANG};
  if(_rmMode==='improve'){
    let txt=RESUME;
    if(!txt){
      if(!fileInput.files[0]){ toast(t('resume_need_file')); return; }
      if(!validateFile(fileInput.files[0])) return;
      st.textContent=t('resume_parsing');
      try{
        const fd=new FormData(); fd.append('resume', fileInput.files[0]);
        const pr=await fetch(API+'/api/parse',{method:'POST',body:fd});
        if(!pr.ok) throw {code: await readErrCode(pr)};
        txt=((await pr.json()).resume_text)||'';
      }catch(e){ st.textContent=errMsg(e&&e.code); return; }
    }
    if(!txt){ toast(t('resume_need_file')); return; }
    ctx.resume_text=txt; ctx.target=rmVal('rmTarget');
  } else {
    const fields={ name:rmVal('rmName'), contacts:rmVal('rmContacts'), target_role:rmVal('rmRole'),
      experience:rmVal('rmExp'), skills:rmVal('rmSkills'), education:rmVal('rmEdu') };
    if(!Object.values(fields).some(v=>v)){ toast(t('resume_need_fields')); return; }
    ctx.fields=fields;
  }
  if(_PAIDR && _PAIDR.on){
    const email=rmVal('rmEmail');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast(t('pay_email_req')); return; }
    st.textContent=t('pay_creating');
    try{
      localStorage.setItem('dw_pending', JSON.stringify(ctx));
      const r=await fetch(API+'/api/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email, product:'resume'})});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json();
      if(!d.confirmation_url) throw {code:'pay_error'};
      localStorage.setItem('dw_payid', d.payment_id);
      window.location.href=d.confirmation_url;
    }catch(e){ st.textContent=errMsg(e&&e.code); localStorage.removeItem('dw_pending'); }
  } else {
    st.textContent=t('resume_generating');
    const body=_rmMode==='create'?{mode:'create', fields:ctx.fields, lang:LANG}:{mode:'improve', resume_text:ctx.resume_text, target:ctx.target, lang:LANG};
    try{
      const r=await fetch(API+'/api/resume',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json(); st.textContent=''; showResumeResult(d.resume||'');
    }catch(e){ st.textContent=errMsg(e&&e.code); }
  }
}
(function(){
  const tabI=document.getElementById('rmTabImprove'), tabC=document.getElementById('rmTabCreate'), go=document.getElementById('rmGo');
  if(!go) return;
  if(tabI) tabI.addEventListener('click',()=>setRmMode('improve'));
  if(tabC) tabC.addEventListener('click',()=>setRmMode('create'));
  go.addEventListener('click', onResumeGo);
  setRmMode('improve'); setupResumeUI();
})();

// Scroll-in animations for static sections
(function(){
  if(!('IntersectionObserver' in window)) { document.querySelectorAll('.anim').forEach(el=>el.classList.add('visible')); return; }
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); } });
  },{threshold:0.12});
  document.querySelectorAll('.anim').forEach(el=>obs.observe(el));
})();

applyLang();
