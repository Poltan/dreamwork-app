<style>
  :root{

    --accent:#5247d6; --accent-d:#3f37a8; --accent-l:#eeedff;
    --grad:linear-gradient(135deg,#5b51e6 0%,#7b5cf0 100%);
    --teal:#0F6E56; --teal-l:#E1F5EE; --amber:#8a5208; --amber-l:#FAEEDA;
    --radius:16px;
    --sh-sm:0 1px 2px rgba(30,30,70,.06);
    --sh:0 8px 28px rgba(40,40,90,.08);
    --sh-lg:0 18px 44px rgba(40,40,90,.14);
    --shadow:var(--sh);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{background:var(--bg);color:var(--ink);font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}

  .nav{display:flex;align-items:center;gap:14px}
  .lang{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .lang button{border:none;background:var(--surface);color:var(--muted);padding:5px 11px;font-size:.82rem;cursor:pointer;font-family:inherit}
  .lang button.on{background:var(--accent);color:#fff}
  .hero{position:relative;display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:center;margin:18px 0 8px}
  .hero::before{content:"";position:absolute;inset:-40px -30px auto -30px;height:340px;background:radial-gradient(1100px 300px at 18% 30%,rgba(123,92,240,.13),transparent 70%);z-index:-1}
  .hero h1{font-size:2.5rem;line-height:1.12;font-weight:800}
  .hero .sub{color:var(--muted);font-size:1.05rem;margin-top:12px;max-width:480px}
  .steps{margin-top:22px;display:flex;flex-direction:column;gap:12px}
  .step{display:flex;align-items:center;gap:11px;font-size:.98rem}
  .step .n{flex:none;width:26px;height:26px;border-radius:50%;background:var(--accent-l);color:var(--accent-d);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem}
  .pricing-teaser{margin-top:22px;display:inline-flex;align-items:center;gap:8px;background:var(--accent-l);color:var(--accent-d);font-weight:600;font-size:.92rem;padding:8px 14px;border-radius:10px}
  .trust{margin-top:14px;color:var(--muted);font-size:.85rem}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:24px;box-shadow:var(--sh-lg)}

  label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:5px}
  input[type=text],input[type=number],select{width:100%;background:var(--bg);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-family:inherit;font-size:.92rem}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(82,71,214,.13)}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
  .field{flex:1;min-width:130px}
  .field label{min-height:2.8em}
  .filebox{border:1.5px dashed #c9c9e0;border-radius:13px;padding:24px 14px;text-align:center;color:var(--muted);cursor:pointer;transition:.18s;margin-bottom:15px;font-size:.93rem;font-weight:500}
  .filebox:hover{border-color:var(--accent);background:#faf9ff;color:var(--accent-d)}
  .filebox.has{border-color:var(--teal);color:var(--teal);background:var(--teal-l)}
  .check{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.9rem}
  .btn{border:none;cursor:pointer;border-radius:11px;padding:11px 18px;font-size:.92rem;font-weight:600;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:.15s}

  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .spinner{display:none;color:var(--muted);font-size:.9rem;margin-top:10px;text-align:center}
  .apihint{display:block;margin-top:10px;color:var(--muted);font-size:.76rem;text-align:center}

  .profile b{color:var(--ink)}
  .profile .hint{color:var(--accent);opacity:.85;font-size:.8rem}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;margin-bottom:14px;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s}

  .meta{font-size:.84rem;color:var(--muted);margin-top:8px}
  .salary{font-weight:700;margin-top:6px}

  .fit{font-size:.9rem;margin:10px 0;color:#3a3d55}
  .score{display:inline-block;font-size:.72rem;background:var(--teal-l);color:var(--teal);border-radius:9px;padding:2px 9px;margin-left:8px;font-weight:600}
  .actions{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}

  .letter-box{display:none;margin-top:14px;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:14px}

  textarea{width:100%;min-height:210px;background:var(--surface);color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:12px;font-family:inherit;font-size:.9rem;line-height:1.5;resize:vertical}

  .lactions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

  .lang-toggle button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  small.hint{color:var(--muted);font-size:.78rem;display:block;margin-top:8px}
  .status-msg{color:var(--muted);font-size:.9rem;margin-top:8px}

  .note{font-size:.78rem;color:var(--muted);text-align:center;margin-top:8px}
  .section{margin:54px 0}
  .section h2{font-size:1.55rem;font-weight:800;margin-bottom:18px;position:relative;padding-left:14px}
  .section h2::before{content:"";position:absolute;left:0;top:.16em;bottom:.16em;width:4px;border-radius:3px;background:var(--grad)}
  .trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px}
  .trust-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--sh-sm);transition:transform .15s,box-shadow .15s}

  .trust-card .ic svg{width:22px;height:22px}
  .trust-card h3{font-size:1.05rem;font-weight:800;margin-bottom:6px}
  .trust-card p{font-size:.88rem;color:var(--muted)}
  details.faq{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 18px;margin-bottom:9px;transition:.15s}
  details.faq[open]{box-shadow:var(--sh-sm)}
  details.faq summary{cursor:pointer;font-weight:600;font-size:.95rem;list-style:none}
  details.faq summary::-webkit-details-marker{display:none}
  details.faq summary::before{content:"+";color:var(--accent);font-weight:700;margin-right:8px}
  details.faq[open] summary::before{content:"–"}
  details.faq .a{font-size:.9rem;color:var(--muted);margin-top:8px;line-height:1.6}
  footer a{color:var(--accent);text-decoration:none;cursor:pointer}
  footer .legal{margin-top:12px;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
  footer details{margin:10px auto 0;max-width:620px;text-align:left}
  footer details .a{font-size:.82rem;color:var(--muted);margin-top:6px;line-height:1.6}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 24px;border-radius:13px;font-weight:600;font-size:.9rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:99;box-shadow:var(--sh-lg)}
  .toast.show{opacity:1}
  footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:.82rem;text-align:center}
  @media(max-width:760px){ .hero{grid-template-columns:1fr;gap:20px} .hero h1{font-size:2rem} .wrap{padding:0 16px 60px} }
  @media(prefers-reduced-motion:reduce){ *{transition:none!important;animation:none!important} .card:hover,.trust-card:hover{transform:none} }
</style>
</head>

let LANG = localStorage.getItem('dw_lang') || ((navigator.language||'').toLowerCase().startsWith('ru') ? 'ru' : 'en');
function t(k){ return (T[LANG] && T[LANG][k]) || (T.ru[k]||k); }

function applyLang(){
  document.documentElement.lang = LANG;
  document.title = t('title');
  const md=document.getElementById('metadesc'); if(md) md.content = t('meta_desc');
  document.querySelectorAll('[data-i]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i')); });
  document.querySelectorAll('[data-i-ph]').forEach(el=>{ el.placeholder = t(el.getAttribute('data-i-ph')); });
  document.querySelectorAll('[data-ui-lang]').forEach(b=>b.classList.toggle('on', b.getAttribute('data-ui-lang')===LANG));
  if(fileInput && fileInput.files[0]){ filebox.textContent='✅ '+fileInput.files[0].name; filebox.classList.add('has'); }
  refreshApiHint();
}

const fileInput = document.getElementById('file');
const filebox = document.getElementById('filebox');
const MAX_UPLOAD_MB = 5;

// Front-end guard: only accept PDF/DOCX/TXT within the size limit. The backend
// re-validates (incl. file signatures), but this gives instant, friendly feedback.
function validateFile(f){
  if(!f) return false;
  if(!/\.(pdf|docx|txt)$/i.test(f.name)){ toast(t('err_bad_format')); return false; }
  if(f.size === 0){ toast(t('err_empty_file')); return false; }
  if(f.size > MAX_UPLOAD_MB*1024*1024){ toast(t('err_too_large')); return false; }
  return true;
}
function markFile(f){ filebox.textContent='✅ '+f.name; filebox.classList.add('has'); }

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if(!f) return;
  if(validateFile(f)){ markFile(f); }
  else { fileInput.value=''; filebox.classList.remove('has'); filebox.textContent=t('form_file'); }
});
['dragover','dragleave','drop'].forEach(ev => filebox.addEventListener(ev, e => {
  e.preventDefault();
  if (ev==='drop' && e.dataTransfer.files[0]) {
    const f = e.dataTransfer.files[0];

  }
}));

function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2600);}
// Security: escape any provider/AI-supplied text before injecting into innerHTML,
// and only allow http(s) links (blocks javascript: and other dangerous schemes).
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeUrl(u){ u=String(u==null?'':u).trim(); return /^https?:\/\//i.test(u) ? u : '#'; }
// Map a backend error code (or none) to a friendly, localized message.
function errMsg(code){ const k='err_'+(code||'generic'); const v=t(k); return (v===k)?t('err_generic'):v; }
// Read a structured error code from a non-OK response, falling back by status.
async function readErrCode(r){
  try{ const j=await r.json(); return (j && j.detail && j.detail.code) || (j && j.code) || null; }
  catch(_){ if(r.status===429) return 'rate_limited'; if(r.status>=500) return 'server'; return null; }
}
function salaryClass(j){
  const lo=j.salary_min; if(!j.salary) return 'gray';
  if(lo && lo>=3000 && j.currency!=='RUB') return 'green';
  if(lo && lo>=270000) return 'green';
  return j.salary? 'amber':'gray';
}

async function copyText(text, ta){
  try{ await navigator.clipboard.writeText(text); return true; }catch(e){}
  try{ if(ta){ ta.focus(); ta.select(); const ok=document.execCommand('copy'); if(ok) return true; } }catch(e){}
  try{ const x=document.createElement('textarea'); x.value=text; x.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(x); x.select(); const ok=document.execCommand('copy'); document.body.removeChild(x); return ok; }catch(e){ return false; }
}

async function runMatch(){
  if(!fileInput.files[0]){ toast(t('t_pick')); return; }
  if(!validateFile(fileInput.files[0])){ return; }
  if(!document.getElementById('consent').checked){ toast(t('consent_required')); return; }
  const go=document.getElementById('go'), sp=document.getElementById('spinner');
  go.disabled=true; sp.style.display='block';
  document.getElementById('results').innerHTML=''; document.getElementById('profile').innerHTML='';
  const fd=new FormData();
  fd.append('resume', fileInput.files[0]);
  fd.append('country', document.getElementById('country').value);
  fd.append('location', document.getElementById('location').value);
  fd.append('salary_min', document.getElementById('salary').value);
  fd.append('currency', document.getElementById('currency').value);
  fd.append('remote_ok', document.getElementById('remote').checked);
  try{
    const r=await fetch(API+'/api/match',{method:'POST',body:fd});
    if(!r.ok){ throw {code: await readErrCode(r)}; }
    const data=await r.json();
    PROFILE=data.profile; RESUME=data.resume_excerpt||'';
    renderProfile(data.profile);
    renderResults(data.jobs||[], data.note);
  }catch(e){ toast(errMsg(e&&e.code)); console.error(e); }
  finally{ go.disabled=false; sp.style.display='none'; }
}

let _allJobs=[], _shown=0;
const PAGE=5;
function renderResults(jobs, note){
  const box=document.getElementById('results');
  if(!jobs.length){ box.innerHTML=`<p class="status-msg">${note||t('no_results')}</p>`; return; }
  _allJobs=jobs; _shown=0;
  box.innerHTML=`<h2>${t('results_h')} (${jobs.length})</h2><div id="cards"></div><div id="morewrap" style="text-align:center;margin:10px 0"></div>`;
  showMore();
}
function showMore(){
  const cards=document.getElementById('cards');
  _allJobs.slice(_shown, _shown+PAGE).forEach(j=>cards.appendChild(card(j)));
  _shown=Math.min(_shown+PAGE, _allJobs.length);
  const mw=document.getElementById('morewrap');

    mw.innerHTML=`<button class="btn btn-ghost" id="moreBtn" style="width:auto">${more} (${_allJobs.length-_shown})</button>`;
    document.getElementById('moreBtn').addEventListener('click', showMore);
  } else { mw.innerHTML=''; }
}

function el(h){const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;}

function card(j){
  const sc=j.score!=null?`<span class="score">${esc(j.score)}% ${t('match')}</span>`:'';
  const c=el(`<div class="card">
    <div class="card-top">
      <div><div class="title">${esc(j.title||'')} ${sc}</div><div class="company">${esc(j.company||'')}</div></div>
      <span class="src">${esc(j.source||'')}</span>
    </div>
    <div class="meta">📍 ${esc(j.location||'—')} ${j.remote?t('remote_tag'):''}</div>
    <div class="salary ${salaryClass(j)}">${esc(j.salary||t('salary_none'))}</div>
    ${j.fit?`<div class="fit">${esc(j.fit)}</div>`:''}
    <div class="actions">
      <a class="btn btn-ghost" href="${safeUrl(j.url)}" target="_blank" rel="noopener noreferrer">${t('card_vacancy')}</a>
      <button class="btn btn-primary" style="width:auto" data-a="letter">${t('card_letter')}</button>
      <button class="btn btn-ghost" data-a="apply">${t('card_apply')}</button>
    </div>
    <div class="letter-box" data-box>
      <div class="lang-toggle"><button data-lang="ru">RU</button><button data-lang="en">EN</button></div>
      <div class="status" data-st></div>
      <div data-payrow style="display:none">
        <input data-payemail type="email" placeholder="${t('pay_email_ph')}" style="width:100%;margin-bottom:8px">
        <button class="btn btn-primary" style="width:auto" data-a="pay">${t('pay_btn').replace('{price}',(_PAID&&_PAID.price)||'99')}</button>
        <div class="status" data-payst></div>
      </div>
      <textarea data-ta placeholder="${t('letter_ph')}"></textarea>
      <div class="lactions">
        <button class="btn btn-ghost" data-a="copy">${t('letter_copy')}</button>
        <button class="btn btn-ghost" data-a="regen">${t('letter_regen')}</button>
      </div>
      <small class="hint">${t('letter_hint')}</small>
    </div>
  </div>`);

  const box=c.querySelector('[data-box]'), ta=c.querySelector('[data-ta]'), st=c.querySelector('[data-st]');
  let lang=LANG;
  c.querySelectorAll('[data-lang]').forEach(b=>{
    b.classList.toggle('on', b.dataset.lang===lang);
    b.onclick=()=>{ lang=b.dataset.lang; c.querySelectorAll('[data-lang]').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
  });

  async function gen(force){
    box.classList.add('open');
    // Paid mode: don't generate — collect email and start a YooKassa payment.
    // The letter is delivered after payment, on return to the site.
    if(_PAID && _PAID.on){
      ta.style.display='none';
      c.querySelector('.lactions').style.display='none';
      c.querySelector('[data-payrow]').style.display='block';
      st.textContent=t('pay_hint');
      return;
    }
    if(ta.value && !force){ st.textContent=t('letter_have'); return; }
    st.textContent=t('letter_writing'); ta.value='';
    try{
      const r=await fetch(API+'/api/letter',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({job:j, profile:PROFILE, resume_text:RESUME, lang})});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json(); ta.value=(d.letter||'').trim(); st.textContent=t('letter_ready');
    }catch(e){ st.textContent=t('letter_fail')+errMsg(e&&e.code); }
  }

  async function startPay(){
    const emEl=c.querySelector('[data-payemail]'), payst=c.querySelector('[data-payst]');
    const email=(emEl.value||'').trim();
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast(t('pay_email_req')); return; }
    payst.textContent=t('pay_creating');
    try{
      localStorage.setItem('dw_pending', JSON.stringify({job:j, profile:PROFILE, resume_text:RESUME, lang}));
      const r=await fetch(API+'/api/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json();
      if(!d.confirmation_url) throw {code:'pay_error'};
      localStorage.setItem('dw_payid', d.payment_id);
      window.location.href=d.confirmation_url;
    }catch(e){ payst.textContent=errMsg(e&&e.code); localStorage.removeItem('dw_pending'); }
  }

  c.addEventListener('click', async ev=>{
    const a=ev.target?.dataset?.a; if(!a) return;
    if(a==='letter') gen(false);
    if(a==='pay') startPay();
    if(a==='regen') gen(true);
    if(a==='copy'){ if(!ta.value){toast(t('t_letter_first'));return;}
      toast(await copyText(ta.value, ta)?t('t_copied'):t('t_selected')); }
    if(a==='apply'){ if(!ta.value){ await gen(false); }
      await copyText(ta.value, ta); window.open(safeUrl(j.url),'_blank','noopener');
      toast(t('t_buffer')); }
  });
  return c;
}

// After returning from the YooKassa payment page, verify the payment and deliver the letter.
async function handlePaidReturn(){
  const payid=localStorage.getItem('dw_payid'), pending=localStorage.getItem('dw_pending');
  if(!payid || !pending) return;
  const panel=document.getElementById('paidResult');
  panel.style.display='block';
  panel.innerHTML=`<div class="profile"><b>${t('paid_checking')}</b></div>`;
  try{
    const sr=await fetch(API+'/api/pay/status?payment_id='+encodeURIComponent(payid));
    const sd=await sr.json();
    if(sd.status!=='succeeded'){
      panel.innerHTML=`<div class="profile">${sd.status==='canceled'?t('pay_canceled'):t('pay_processing')}</div>`;
      if(sd.status==='canceled'){ localStorage.removeItem('dw_payid'); localStorage.removeItem('dw_pending'); }
      return;
    }
    const ctx=JSON.parse(pending);
    let endpoint, titleKey, body, isResume=(ctx.product==='resume');
    if(isResume){
      endpoint='/api/resume'; titleKey='paid_resume_title';
      body={mode:ctx.mode, resume_text:ctx.resume_text, target:ctx.target, fields:ctx.fields, lang:ctx.lang, payment_id:payid};
    } else {
      endpoint='/api/letter'; titleKey='paid_letter_title';
      body={job:ctx.job, profile:ctx.profile, resume_text:ctx.resume_text, lang:ctx.lang, payment_id:payid};
    }
    const gr=await fetch(API+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!gr.ok) throw {code: await readErrCode(gr)};
    const gd=await gr.json();
    localStorage.removeItem('dw_payid'); localStorage.removeItem('dw_pending');
    const resultText=isResume?(gd.resume||''):(gd.letter||'');
    if(isResume){ showResumeResult(resultText); return; }
    const sub=`<div class="hint">${esc((ctx.job&&ctx.job.title)||'')} · ${esc((ctx.job&&ctx.job.company)||'')}</div>`;
    panel.innerHTML=`<div class="profile"><b>${t(titleKey)}</b>${sub}</div>
      <textarea id="paidTa" style="width:100%;min-height:240px;margin-top:8px"></textarea>
      <div class="lactions"><button class="btn btn-ghost" id="paidCopy">${t('letter_copy')}</button></div>`;
    document.getElementById('paidTa').value=resultText.trim();
    document.getElementById('paidCopy').addEventListener('click', async ()=>{ const ta=document.getElementById('paidTa'); toast(await copyText(ta.value,ta)?t('t_copied'):t('t_selected')); });
    panel.scrollIntoView({behavior:'smooth'});
  }catch(e){ panel.innerHTML=`<div class="profile">${t('letter_fail')+errMsg(e&&e.code)}</div>`; }
}
handlePaidReturn();

function mdToHtml(md){
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
  let html='', inList=false; const close=()=>{ if(inList){ html+='</ul>'; inList=false; } };
  (md||'').split('\n').forEach(raw=>{
    const s=raw.trim();
    if(!s){ close(); return; }
    if(/^---+$/.test(s)){ close(); html+='<hr>'; return; }
    if(/^###\s+/.test(s)){ close(); html+='<h3>'+inl(s.replace(/^###\s+/,''))+'</h3>'; return; }
    if(/^##\s+/.test(s)){ close(); html+='<h2>'+inl(s.replace(/^##\s+/,''))+'</h2>'; return; }
    if(/^#\s+/.test(s)){ close(); html+='<h1>'+inl(s.replace(/^#\s+/,''))+'</h1>'; return; }
    if(/^[-*•]\s+/.test(s)){ if(!inList){ html+='<ul>'; inList=true; } html+='<li>'+inl(s.replace(/^[-*•]\s+/,''))+'</li>'; return; }
    close(); html+='<p>'+inl(s)+'</p>';
  });
  close(); return html;
}
async function downloadResumeDocx(text){
  if(!text||text.trim().length<20){ toast(t('resume_need_fields')); return; }
  try{
    const r=await fetch(API+'/api/resume/docx',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resume:text})});
    if(!r.ok) throw {code: await readErrCode(r)};
    const blob=await r.blob(); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='resume.docx';
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1500);
  }catch(e){ toast(errMsg(e&&e.code)); }
}
function printResumePdf(text){
  const w=window.open('','_blank');
  if(!w){ toast(t('err_generic')); return; }
  w.document.write(`<!DOCTYPE html><html lang="ru"><head><meta charset="utf-8"><title>resume</title>
    <style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:760px;margin:24px auto;padding:0 24px;color:#15172b;line-height:1.5}
    h1{font-size:1.6rem;margin:0 0 2px} h2{font-size:1.05rem;border-bottom:1px solid #ddd;padding-bottom:3px;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.5px}
    h3{font-size:1rem;margin:12px 0 4px} ul{margin:6px 0;padding-left:20px} li{margin:2px 0} p{margin:6px 0} hr{border:none;border-top:1px solid #e3e4ef;margin:10px 0}</style>
    </head><body>${mdToHtml(text)}</body></html>`);
  w.document.close();
  setTimeout(()=>{ try{ w.focus(); w.print(); }catch(e){} }, 350);
}
async function onResumeGo(){
  const st=document.getElementById('rmStatus');
  const ctx={product:'resume', mode:_rmMode, lang:LANG};
  if(_rmMode==='improve'){
    let txt=RESUME;
    if(!txt){
      if(!fileInput.files[0]){ toast(t('resume_need_file')); return; }
      if(!validateFile(fileInput.files[0])) return;
      st.textContent=t('resume_parsing');
      try{
        const fd=new FormData(); fd.append('resume', fileInput.files[0]);
        const pr=await fetch(API+'/api/parse',{method:'POST',body:fd});
        if(!pr.ok) throw {code: await readErrCode(pr)};
        txt=((await pr.json()).resume_text)||'';
      }catch(e){ st.textContent=errMsg(e&&e.code); return; }
    }
    if(!txt){ toast(t('resume_need_file')); return; }
    ctx.resume_text=txt; ctx.target=rmVal('rmTarget');
  } else {
    const fields={ name:rmVal('rmName'), contacts:rmVal('rmContacts'), target_role:rmVal('rmRole'),
      experience:rmVal('rmExp'), skills:rmVal('rmSkills'), education:rmVal('rmEdu') };
    if(!Object.values(fields).some(v=>v)){ toast(t('resume_need_fields')); return; }
    ctx.fields=fields;
  }
  if(_PAIDR && _PAIDR.on){
    const email=rmVal('rmEmail');
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ toast(t('pay_email_req')); return; }
    st.textContent=t('pay_creating');
    try{
      localStorage.setItem('dw_pending', JSON.stringify(ctx));
      const r=await fetch(API+'/api/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email, product:'resume'})});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json();
      if(!d.confirmation_url) throw {code:'pay_error'};
      localStorage.setItem('dw_payid', d.payment_id);
      window.location.href=d.confirmation_url;
    }catch(e){ st.textContent=errMsg(e&&e.code); localStorage.removeItem('dw_pending'); }
  } else {
    st.textContent=t('resume_generating');
    const body=_rmMode==='create'?{mode:'create', fields:ctx.fields, lang:LANG}:{mode:'improve', resume_text:ctx.resume_text, target:ctx.target, lang:LANG};
    try{
      const r=await fetch(API+'/api/resume',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok) throw {code: await readErrCode(r)};
      const d=await r.json(); st.textContent=''; showResumeResult(d.resume||'');
    }catch(e){ st.textContent=errMsg(e&&e.code); }
  }
}
