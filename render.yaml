services:
  - type: web
    name: dreamwork
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JOOBLE_API_KEY
        sync: false
      - key: ADZUNA_APP_ID
        sync: false
      - key: ADZUNA_APP_KEY
        sync: false
